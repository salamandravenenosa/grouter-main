name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Non-blocking while legacy type errors are cleaned up. Remove
      # continue-on-error once `bunx tsc --noEmit` returns green locally.
      - name: Type check
        run: bunx tsc --noEmit
        continue-on-error: true

      # `bun test` exits 1 when no tests are found. Skip the step while the
      # repo has zero tests — remove the guard once the first *.test.ts lands.
      - name: Test
        run: |
          count=$(find . \( -path ./node_modules -o -path ./dist \) -prune -o -type f \( -name '*.test.*' -o -name '*.spec.*' -o -name '*_test.*' -o -name '*_spec.*' \) -print | wc -l)
          if [ "$count" -gt 0 ]; then
            bun test
          else
            echo "::notice::No test files found — skipping bun test"
          fi

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -x dist/grouter
          ./dist/grouter --version
